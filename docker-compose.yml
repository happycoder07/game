services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: twenty-nine-server
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      # Allow browser origins via the nginx client (and localhost for direct access)
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DATABASE_URL: file:/data/twenty-nine.db
    volumes:
      - tn-data:/data
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    container_name: twenty-nine-client
    ports:
      - "0.0.0.0:8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tn-data:
